<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS4 AI OFFICE — 3D</title>
    <link rel="icon" type="image/svg+xml" href="assets/jarvis-icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        #canvas3d { width: 100vw; height: 100vh; display: block; }
        
        /* HUD Overlay */
        .hud { position: fixed; z-index: 10; pointer-events: none; }
        .hud > * { pointer-events: auto; }
        
        .hud-top {
            top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        
        .hud-title {
            display: flex; align-items: center; gap: 12px;
        }
        .hud-title img { width: 40px; height: 40px; filter: drop-shadow(0 0 8px rgba(0,212,255,0.5)); }
        .hud-title h1 {
            font-size: 20px; color: #00d4ff; letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0,212,255,0.5);
        }
        .hud-title span { font-size: 10px; color: #888; display: block; letter-spacing: 1px; }
        
        .hud-status {
            display: flex; gap: 20px; align-items: center;
        }
        .hud-stat {
            text-align: center; color: #00d4ff;
        }
        .hud-stat .val { font-size: 22px; font-weight: 700; }
        .hud-stat .lbl { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #2ecc71;
            animation: blink 2s infinite; display: inline-block; margin-right: 6px;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        
        /* Bottom panel */
        .hud-bottom {
            bottom: 0; left: 0; right: 0;
            padding: 15px 25px;
            background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 100%);
        }
        
        .cmd-row { display: flex; gap: 10px; max-width: 700px; margin: 0 auto; }
        .cmd-input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 25px; padding: 12px 20px; color: #eee; font-size: 14px; outline: none;
        }
        .cmd-input:focus { border-color: #00d4ff; box-shadow: 0 0 15px rgba(0,212,255,0.2); }
        .cmd-input::placeholder { color: #555; }
        .cmd-btn {
            background: linear-gradient(135deg, #c0392b, #e74c3c); border: none;
            border-radius: 25px; padding: 12px 25px; color: #fff; font-weight: 600;
            cursor: pointer; font-size: 14px; transition: all 0.3s;
        }
        .cmd-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(192,57,43,0.5); }
        
        /* Agent labels in 3D */
        .agent-label {
            position: absolute; pointer-events: none;
            text-align: center; transform: translate(-50%, -100%);
            transition: opacity 0.3s;
        }
        .agent-label .name {
            background: rgba(0,0,0,0.7); color: #fff; padding: 3px 10px;
            border-radius: 10px; font-size: 11px; font-weight: 600;
            border: 1px solid rgba(0,212,255,0.3); white-space: nowrap;
        }
        .agent-label .state {
            font-size: 9px; color: #00d4ff; margin-top: 2px;
        }
        .agent-label .bubble {
            background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
            border-radius: 8px; padding: 4px 8px; font-size: 10px; color: #aaa;
            margin-top: 4px; max-width: 150px; word-wrap: break-word;
            display: none;
        }
        .agent-label .bubble.active { display: block; }
        
        /* Activity log */
        .hud-log {
            position: fixed; right: 15px; top: 70px; bottom: 80px; width: 300px;
            background: rgba(0,0,0,0.7); border: 1px solid #222; border-radius: 12px;
            padding: 12px; overflow-y: auto; z-index: 10;
        }
        .hud-log h3 { color: #00d4ff; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .log-item {
            padding: 6px 8px; margin-bottom: 4px; font-size: 11px; color: #aaa;
            border-left: 2px solid #333; border-radius: 0 4px 4px 0;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .log-item.info { border-color: #00d4ff; }
        .log-item.success { border-color: #2ecc71; }
        .log-item.error { border-color: #e74c3c; }
        .log-item .time { color: #555; font-size: 9px; }
        .log-item .agent { color: #f5c518; font-weight: 600; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- HUD Top -->
<div class="hud hud-top">
    <div class="hud-title">
        <img src="assets/jarvis-icon.svg" alt="J4">
        <h1>JARVIS4 AI OFFICE<span>3D Autonomous AI Organization</span></h1>
    </div>
    <div class="hud-status">
        <div class="hud-stat"><div class="val" id="sAgents">9</div><div class="lbl">Agents</div></div>
        <div class="hud-stat"><div class="val" id="sActive">0</div><div class="lbl">Active</div></div>
        <div class="hud-stat"><div class="val" id="sDone">0</div><div class="lbl">Done</div></div>
        <div><span class="status-dot"></span><span style="color:#2ecc71;font-size:12px" id="connSt">Online</span></div>
    </div>
</div>

<!-- Activity Log -->
<div class="hud-log" id="logPanel">
    <h3>Activity Log</h3>
    <div id="logList"></div>
</div>

<!-- HUD Bottom -->
<div class="hud hud-bottom">
    <div class="cmd-row">
        <input type="text" class="cmd-input" id="cmdInput" placeholder="Give a task to Jarvis..." 
               onkeypress="if(event.key==='Enter')sendCmd()">
        <button class="cmd-btn" onclick="sendCmd()">EXECUTE</button>
    </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// 3D OFFICE SCENE
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas3d');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ─── Lighting ─────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
mainLight.position.set(10, 15, 10);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 2048;
mainLight.shadow.mapSize.height = 2048;
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 50;
mainLight.shadow.camera.left = -20;
mainLight.shadow.camera.right = 20;
mainLight.shadow.camera.top = 20;
mainLight.shadow.camera.bottom = -20;
scene.add(mainLight);

// Blue accent lights
const blueLight1 = new THREE.PointLight(0x00d4ff, 0.5, 20);
blueLight1.position.set(-8, 5, -5);
scene.add(blueLight1);

const blueLight2 = new THREE.PointLight(0x00d4ff, 0.5, 20);
blueLight2.position.set(8, 5, 5);
scene.add(blueLight2);

const redLight = new THREE.PointLight(0xc0392b, 0.3, 15);
redLight.position.set(0, 6, 0);
scene.add(redLight);

// ─── Floor ────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 20);
const floorMat = new THREE.MeshStandardMaterial({ 
    color: 0x1a1a2e, roughness: 0.8, metalness: 0.2 
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Floor grid
const gridHelper = new THREE.GridHelper(30, 30, 0x222244, 0x111122);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ─── Walls ────────────────────────────────────────────────────
function createWall(w, h, d, x, y, z, color = 0x1a1a3e) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.9, metalness: 0.1 });
    const wall = new THREE.Mesh(geo, mat);
    wall.position.set(x, y, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    scene.add(wall);
    return wall;
}

// Back wall
createWall(30, 5, 0.3, 0, 2.5, -10);
// Left wall
createWall(0.3, 5, 20, -15, 2.5, 0);
// Right wall
createWall(0.3, 5, 20, 15, 2.5, 0);

// ─── Windows (glowing panels on back wall) ────────────────────
for (let i = -3; i <= 3; i++) {
    const winGeo = new THREE.PlaneGeometry(2.5, 2.5);
    const winMat = new THREE.MeshBasicMaterial({ 
        color: 0x1a3a5a, transparent: true, opacity: 0.4 
    });
    const win = new THREE.Mesh(winGeo, winMat);
    win.position.set(i * 3.5, 2.8, -9.8);
    scene.add(win);
    
    // Window frame
    const frameGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(2.6, 2.6, 0.05));
    const frameMat = new THREE.LineBasicMaterial({ color: 0x334466 });
    const frame = new THREE.LineSegments(frameGeo, frameMat);
    frame.position.copy(win.position);
    scene.add(frame);
}

// ─── Desks ────────────────────────────────────────────────────
function createDesk(x, z, color = 0x2c2c4e) {
    const group = new THREE.Group();
    
    // Desktop
    const topGeo = new THREE.BoxGeometry(2.2, 0.08, 1.2);
    const topMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.3 });
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.y = 0.9;
    top.castShadow = true;
    group.add(top);
    
    // Legs
    const legGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.9, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x444466, metalness: 0.5 });
    [[-0.9, -0.5], [0.9, -0.5], [-0.9, 0.5], [0.9, 0.5]].forEach(([lx, lz]) => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(lx, 0.45, lz);
        group.add(leg);
    });
    
    // Monitor
    const monGeo = new THREE.BoxGeometry(0.8, 0.5, 0.05);
    const monMat = new THREE.MeshStandardMaterial({ color: 0x111122, emissive: 0x001133, emissiveIntensity: 0.3 });
    const mon = new THREE.Mesh(monGeo, monMat);
    mon.position.set(0, 1.35, -0.3);
    group.add(mon);
    
    // Screen glow
    const screenGeo = new THREE.PlaneGeometry(0.7, 0.4);
    const screenMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.15 });
    const screen = new THREE.Mesh(screenGeo, screenMat);
    screen.position.set(0, 1.35, -0.27);
    group.add(screen);
    
    // Chair
    const chairGeo = new THREE.BoxGeometry(0.6, 0.08, 0.6);
    const chairMat = new THREE.MeshStandardMaterial({ color: 0x333355 });
    const chair = new THREE.Mesh(chairGeo, chairMat);
    chair.position.set(0, 0.55, 0.8);
    group.add(chair);
    
    const backGeo = new THREE.BoxGeometry(0.6, 0.7, 0.08);
    const back = new THREE.Mesh(backGeo, chairMat);
    back.position.set(0, 0.9, 1.1);
    group.add(back);
    
    group.position.set(x, 0, z);
    scene.add(group);
    return group;
}

// ─── Agent 3D Characters ──────────────────────────────────────
const agentData = [
    { name: "Master", color: 0xc0392b, x: 0, z: -5, desk: null, role: "Boss" },
    { name: "ProjectManager", color: 0x2980b9, x: -5, z: -2, desk: null, role: "PM" },
    { name: "AgentFactory", color: 0x8e44ad, x: 5, z: -2, desk: null, role: "Factory" },
    { name: "Researcher", color: 0x27ae60, x: -8, z: 2, desk: null, role: "Research" },
    { name: "Programmer", color: 0x2c3e50, x: -4, z: 2, desk: null, role: "Dev" },
    { name: "Analyst", color: 0xe67e22, x: 0, z: 2, desk: null, role: "Analytics" },
    { name: "Designer", color: 0xe91e63, x: 4, z: 2, desk: null, role: "Design" },
    { name: "Artist", color: 0x9b59b6, x: 8, z: 2, desk: null, role: "Art" },
    { name: "Marketer", color: 0x1abc9c, x: -2, z: 6, desk: null, role: "Marketing" },
];

const agents3D = [];

function createHumanoid(color, x, z) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.2 });
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xf0c8a0, roughness: 0.7 });
    
    // Body (torso)
    const bodyGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.8, 8);
    const body = new THREE.Mesh(bodyGeo, mat);
    body.position.y = 1.2;
    group.add(body);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.2, 12, 12);
    const head = new THREE.Mesh(headGeo, skinMat);
    head.position.y = 1.8;
    head.castShadow = true;
    group.add(head);
    
    // Hair
    const hairGeo = new THREE.SphereGeometry(0.22, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const hairMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const hair = new THREE.Mesh(hairGeo, hairMat);
    hair.position.y = 1.85;
    group.add(hair);
    
    // Arms
    const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.6, 6);
    const leftArm = new THREE.Mesh(armGeo, mat);
    leftArm.position.set(-0.35, 1.15, 0);
    leftArm.rotation.z = 0.15;
    group.add(leftArm);
    
    const rightArm = new THREE.Mesh(armGeo, mat);
    rightArm.position.set(0.35, 1.15, 0);
    rightArm.rotation.z = -0.15;
    group.add(rightArm);
    
    // Legs
    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.7, 6);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x222244 });
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.12, 0.45, 0);
    group.add(leftLeg);
    
    const rightLeg = new THREE.Mesh(legGeo, legMat);
    rightLeg.position.set(0.12, 0.45, 0);
    group.add(rightLeg);
    
    // Shoes
    const shoeGeo = new THREE.BoxGeometry(0.12, 0.06, 0.2);
    const shoeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const leftShoe = new THREE.Mesh(shoeGeo, shoeMat);
    leftShoe.position.set(-0.12, 0.08, 0.04);
    group.add(leftShoe);
    const rightShoe = new THREE.Mesh(shoeGeo, shoeMat);
    rightShoe.position.set(0.12, 0.08, 0.04);
    group.add(rightShoe);
    
    // Status indicator (floating ring)
    const ringGeo = new THREE.TorusGeometry(0.3, 0.02, 8, 24);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.5 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = 2.1;
    ring.rotation.x = Math.PI / 2;
    group.add(ring);
    
    group.position.set(x, 0, z);
    group.castShadow = true;
    scene.add(group);
    
    return { group, ring, body, head, leftArm, rightArm, leftLeg, rightLeg, mat };
}

// Create desks and agents
agentData.forEach((data, i) => {
    data.desk = createDesk(data.x, data.z);
    const agent3d = createHumanoid(data.color, data.x, data.z + 0.8);
    agent3d.name = data.name;
    agent3d.state = 'idle';
    agent3d.targetX = data.x;
    agent3d.targetZ = data.z + 0.8;
    agent3d.homeX = data.x;
    agent3d.homeZ = data.z + 0.8;
    agent3d.walkTimer = Math.random() * 100;
    agent3d.task = '';
    agents3D.push(agent3d);
});

// ─── Central hologram table (Master's area) ───────────────────
const holoGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.1, 32);
const holoMat = new THREE.MeshStandardMaterial({ 
    color: 0x0a0a2e, emissive: 0x001133, emissiveIntensity: 0.5,
    transparent: true, opacity: 0.8, metalness: 0.8 
});
const holoTable = new THREE.Mesh(holoGeo, holoMat);
holoTable.position.set(0, 0.5, -5);
scene.add(holoTable);

// Hologram beam
const beamGeo = new THREE.CylinderGeometry(0.02, 0.8, 3, 16, 1, true);
const beamMat = new THREE.MeshBasicMaterial({ 
    color: 0x00d4ff, transparent: true, opacity: 0.08, side: THREE.DoubleSide 
});
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.set(0, 2, -5);
scene.add(beam);

// ─── Decorations ──────────────────────────────────────────────
// Plants
function createPlant(x, z) {
    const g = new THREE.Group();
    const potGeo = new THREE.CylinderGeometry(0.2, 0.15, 0.3, 8);
    const potMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const pot = new THREE.Mesh(potGeo, potMat);
    pot.position.y = 0.15;
    g.add(pot);
    
    const leafGeo = new THREE.SphereGeometry(0.3, 8, 8);
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
    const leaves = new THREE.Mesh(leafGeo, leafMat);
    leaves.position.y = 0.5;
    leaves.scale.y = 1.3;
    g.add(leaves);
    
    g.position.set(x, 0, z);
    scene.add(g);
}
createPlant(-13, -8);
createPlant(13, -8);
createPlant(-13, 8);
createPlant(13, 8);

// Water cooler
const coolerGeo = new THREE.CylinderGeometry(0.2, 0.2, 1, 8);
const coolerMat = new THREE.MeshStandardMaterial({ color: 0x87CEEB, metalness: 0.5 });
const cooler = new THREE.Mesh(coolerGeo, coolerMat);
cooler.position.set(12, 0.5, -5);
scene.add(cooler);

// ─── Animation Loop ───────────────────────────────────────────
let time = 0;
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    time += dt;
    
    // Camera gentle orbit
    camera.position.x = Math.sin(time * 0.05) * 2;
    camera.position.y = 12 + Math.sin(time * 0.1) * 0.5;
    camera.lookAt(0, 1, 0);
    
    // Hologram rotation
    beam.rotation.y += dt * 0.5;
    beam.material.opacity = 0.05 + Math.sin(time * 2) * 0.03;
    
    // Animate agents
    agents3D.forEach((a, i) => {
        a.walkTimer += dt;
        
        if (a.state === 'working') {
            // Typing animation (arms move)
            a.leftArm.rotation.x = Math.sin(time * 8 + i) * 0.3;
            a.rightArm.rotation.x = Math.sin(time * 8 + i + 1) * 0.3;
            // Ring pulses
            a.ring.material.color.setHex(0x00d4ff);
            a.ring.material.opacity = 0.3 + Math.sin(time * 4) * 0.3;
            a.ring.scale.set(1 + Math.sin(time * 3) * 0.1, 1, 1 + Math.sin(time * 3) * 0.1);
        } else if (a.state === 'thinking') {
            // Head tilts, ring yellow
            a.head.rotation.z = Math.sin(time * 2 + i) * 0.15;
            a.ring.material.color.setHex(0xf5c518);
            a.ring.material.opacity = 0.5 + Math.sin(time * 3) * 0.3;
        } else if (a.state === 'idle') {
            // Subtle idle animation
            a.group.position.y = Math.sin(time * 0.5 + i * 0.7) * 0.02;
            a.head.rotation.y = Math.sin(time * 0.3 + i) * 0.1;
            a.ring.material.color.setHex(0x333355);
            a.ring.material.opacity = 0.2;
            
            // Occasionally walk to random spot
            if (Math.random() < 0.001) {
                a.targetX = a.homeX + (Math.random() - 0.5) * 4;
                a.targetZ = a.homeZ + (Math.random() - 0.5) * 3;
            }
        } else if (a.state === 'finished') {
            a.ring.material.color.setHex(0x2ecc71);
            a.ring.material.opacity = 0.6;
        }
        
        // Movement towards target
        const dx = a.targetX - a.group.position.x;
        const dz = a.targetZ - a.group.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        
        if (dist > 0.1) {
            const speed = 1.5 * dt;
            a.group.position.x += (dx / dist) * speed;
            a.group.position.z += (dz / dist) * speed;
            
            // Walking animation
            a.leftLeg.rotation.x = Math.sin(time * 6 + i) * 0.4;
            a.rightLeg.rotation.x = -Math.sin(time * 6 + i) * 0.4;
            
            // Face direction
            a.group.rotation.y = Math.atan2(dx, dz);
        } else {
            a.leftLeg.rotation.x *= 0.9;
            a.rightLeg.rotation.x *= 0.9;
        }
        
        // Return home if idle and far
        if (a.state === 'idle' && dist < 0.1 && Math.random() < 0.005) {
            a.targetX = a.homeX;
            a.targetZ = a.homeZ;
        }
    });
    
    // Lights animation
    blueLight1.intensity = 0.3 + Math.sin(time * 1.5) * 0.2;
    blueLight2.intensity = 0.3 + Math.cos(time * 1.5) * 0.2;
    
    renderer.render(scene, camera);
    updateLabels();
}

// ─── 2D Labels over 3D agents ─────────────────────────────────
const labelContainer = document.createElement('div');
labelContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;';
document.body.appendChild(labelContainer);

const labels = [];
agentData.forEach((data, i) => {
    const label = document.createElement('div');
    label.className = 'agent-label';
    label.innerHTML = `
        <div class="name">${data.name}</div>
        <div class="state">IDLE</div>
        <div class="bubble" id="bubble${i}"></div>
    `;
    labelContainer.appendChild(label);
    labels.push(label);
});

function updateLabels() {
    agents3D.forEach((a, i) => {
        const pos = a.group.position.clone();
        pos.y += 2.4;
        pos.project(camera);
        
        const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
        
        labels[i].style.left = x + 'px';
        labels[i].style.top = y + 'px';
        labels[i].style.opacity = pos.z < 1 ? '1' : '0';
        
        const stateEl = labels[i].querySelector('.state');
        stateEl.textContent = a.state.toUpperCase();
        stateEl.style.color = {
            idle: '#555', thinking: '#f5c518', working: '#00d4ff',
            finished: '#2ecc71', error: '#e74c3c'
        }[a.state] || '#555';
    });
}

// ─── Cloud Sync — Auto-detect API URL ─────────────────────────
const API_CANDIDATES = [
    'https://jarvis4-production-22c6.up.railway.app',
    window.location.origin,
    'http://localhost:8000'
];
// Allow manual override via URL parameter: ?api=https://your-url.railway.app
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('api')) API_CANDIDATES.unshift(urlParams.get('api'));
let API_BASE = 'http://localhost:8000';

async function detectAPI() {
    for (const url of API_CANDIDATES) {
        if (!url || url === 'null' || url.startsWith('file:')) continue;
        try {
            const r = await fetch(url + '/', { signal: AbortSignal.timeout(3000) });
            if (r.ok) { API_BASE = url; addLog('System', 'Cloud connected: ' + url, 'success');
                document.getElementById('connSt').textContent = 'Online';
                document.getElementById('connSt').style.color = '#2ecc71'; return; }
        } catch(e) {}
    }
    document.getElementById('connSt').textContent = 'Offline';
    document.getElementById('connSt').style.color = '#e74c3c';
    addLog('System', 'Cloud unreachable. Retrying...', 'error');
    setTimeout(detectAPI, 10000);
}
detectAPI();

// Poll cloud status every 3s
async function pollCloud() {
    try {
        const r = await fetch(API_BASE + '/status', { signal: AbortSignal.timeout(5000) });
        if (r.ok) {
            const data = await r.json();
            let active = 0;
            (data.agents||[]).forEach(a => {
                const a3d = agents3D.find(x => x.name.toLowerCase() === (a.name||'').toLowerCase());
                if (a3d) {
                    const old = a3d.state;
                    a3d.state = a.state || 'idle';
                    if (a.state === 'working' || a.state === 'thinking') active++;
                    if (a.current_task && a.state === 'working' && old !== 'working') {
                        a3d.targetX = a3d.homeX + (Math.random()-0.5)*2;
                        a3d.targetZ = a3d.homeZ - 1;
                        addLog(a.name, a.current_task.substring(0,40)+'...', 'info');
                    }
                    if (a.state === 'finished' && old === 'working') {
                        a3d.targetX = a3d.homeX; a3d.targetZ = a3d.homeZ;
                        addLog(a.name, 'Done!', 'success');
                    }
                }
            });
            document.getElementById('sActive').textContent = active;
            const done = (data.tasks||[]).filter(t=>t.state==='finished').length;
            document.getElementById('sDone').textContent = done;
        }
    } catch(e) {}
    setTimeout(pollCloud, 3000);
}
setTimeout(pollCloud, 2000);

// WebSocket (optional, for local dev)
let ws = null;
function connectWS() {
    try {
        const wsUrl = API_BASE.replace('http','ws').replace(':8000',':8765');
        ws = new WebSocket(wsUrl);
        ws.onmessage = (e) => { try { const d=JSON.parse(e.data); if(d.agents) d.agents.forEach(a=>{
            const a3d=agents3D.find(x=>x.name.toLowerCase()===(a.name||'').toLowerCase());
            if(a3d) a3d.state=a.state||'idle'; }); } catch(e){} };
        ws.onclose = () => setTimeout(connectWS, 10000);
    } catch(e) {}
}
setTimeout(connectWS, 3000);

// ─── Commands ─────────────────────────────────────────────────
let doneCount = 0;
async function sendCmd() {
    const input = document.getElementById('cmdInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addLog('You', text, 'info');
    
    // Make Master agent walk to hologram
    const master = agents3D[0];
    master.state = 'thinking';
    master.targetX = 0;
    master.targetZ = -4;
    
    try {
        const resp = await fetch(API_BASE + '/task', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({description: text})
        });
        if (resp.ok) {
            const data = await resp.json();
            addLog('System', 'Task created: ' + (data.task_id||'OK').substring(0,8), 'success');
            doneCount++;
            document.getElementById('sDone').textContent = doneCount;
        }
    } catch(e) {
        addLog('System', 'API offline - task saved locally', 'error');
    }
    
    setTimeout(() => { master.state = 'idle'; master.targetX = master.homeX; master.targetZ = master.homeZ; }, 5000);
}

function addLog(agent, msg, cls='info') {
    const list = document.getElementById('logList');
    const t = new Date().toLocaleTimeString('ru-RU');
    const div = document.createElement('div');
    div.className = 'log-item ' + cls;
    div.innerHTML = `<span class="time">${t}</span> <span class="agent">${agent}</span>: ${msg}`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
    while (list.children.length > 50) list.removeChild(list.firstChild);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
