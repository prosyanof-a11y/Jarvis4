version: '3.8'

services:
  jarvis4:
    build: .
    container_name: jarvis4-ai-office
    restart: unless-stopped
    ports:
      - "8000:8000"   # FastAPI
      - "8765:8765"   # WebSocket
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
      - ./generated_images:/app/generated_images
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
